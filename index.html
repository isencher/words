funds were insufficient to cover the costs.",exampleCn:"这些资金不足以支付费用。",collocation:["insufficient funds","insufficient evidence","wholly insufficient"],synonyms:["inadequate","deficient"],antonyms:["sufficient","enough"],formality:"formal",register:"正式/商务",quantity:.28,sentiment:.3,etymology:{prefix:"in-",root:"sufficient",analysis:'in-（否定）+ sufficient（足够的）= "不够的"。sufficient 来自拉丁语 sufficere（suf- "在下面" + facere "做"），原意是"从下面支撑起来"，引申为"足以满足"。加上否定前缀 in- 后，表示"支撑不起来"。'}},{id:4,word:"enough",phonetic:"/ɪˈnʌf/",meaning:"够了（口语）",nuance:"最日常的表达，表示数量满足需求。语气轻松自然，情感完全中性。可作形容词、副词和代词。",example:"Do we have enough time to finish this?",exampleCn:"我们有足够的时间完成这个吗？",collocation:["enough time","good enough","enough is enough"],synonyms:["sufficient","adequate"],antonyms:["insufficient","not enough"],formality:"informal",register:"日常口语",quantity:.42,sentiment:.5,etymology:{root:"enough",analysis:'源自古英语 genog，由 ge-（表示完成）+ nog（足够的）组成。与德语 genug 同源。这个词本身就是词根，是英语中最古老的"足够"表达。有趣的是，enough 的拼写保留了古英语特征，而 sufficient 则是后来从拉丁语借来的"高级版"。'}},{id:5,word:"adequate",phonetic:"/ˈædɪkwət/",meaning:"勉强及格；够用但不出彩",nuance:'暗示"刚好够用"，但往往带有"只是凑合"的潜台词。不是赞美，而是最低限度的认可。情感偏中性略消极。',example:"The facilities are adequate but not luxurious.",exampleCn:"设施够用，但谈不上豪华。",collocation:["adequate for","adequate preparation","merely adequate"],synonyms:["satisfactory","passable"],antonyms:["inadequate","deficient"],formality:"neutral",register:"通用",quantity:.48,sentiment:.42,etymology:{prefix:"ad-",root:"equ",suffix:"-ate",analysis:'ad-（向、朝）+ equ（平等、相等，来自拉丁语 aequus）+ -ate（形容词后缀）= "与需求相等的"。核心意象是"刚好达到标准线"——不多不少，正好够。这也解释了为什么 adequate 常带有"凑合"的意味：它只是"达标"，而非"优秀"。'}},{id:6,word:"sufficient",phonetic:"/səˈfɪʃənt/",meaning:"完全够用（正式）",nuance:"enough 的正式版，语气更客观、更书面。强调数量足以满足需求，情感中性，无褒贬色彩。",example:"We have sufficient evidence to proceed with the case.",exampleCn:"我们有足够的证据推进这个案件。",collocation:["sufficient evidence","sufficient funds","sufficient reason"],synonyms:["enough","adequate"],antonyms:["insufficient","inadequate"],formality:"formal",register:"正式/学术",quantity:.52,sentiment:.5,etymology:{prefix:"suf-",root:"fic",suffix:"-ient",analysis:'suf-（在下面、从下面）+ fic（做，来自拉丁语 facere）+ -ient（形容词后缀）= "从下面支撑起来的"。原意是"足以支撑、足以完成"，引申为"足够的"。与 efficient（ef- "出" + fic "做" = "做出效果的"）同源，共享 fic 词根。'}},{id:7,word:"decent",phonetic:"/ˈdiːsənt/",meaning:"像样的；质量不错的",nuance:'从"数量够"跃升到"质量好"。不仅够用，而且让人满意。情感积极，是日常口语中对事物的正面评价。',example:"He earns a decent salary for his age.",exampleCn:"以他的年龄来说，他的薪水算不错了。",collocation:["decent salary","decent meal","pretty decent"],synonyms:["respectable","good"],antonyms:["poor","inadequate"],formality:"informal",register:"日常/口语",quantity:.58,sentiment:.72,etymology:{root:"dec",suffix:"-ent",analysis:'来自拉丁语 decens（合适的、得体的），与 decorate（装饰）同源，共享 dec 词根（合适、美观）。核心意象是"符合社会标准的、体面的"。decent 最初指"衣着得体"，后来扩展到"品质过关"。记住：decent = "拿得出手的"。'}},{id:8,word:"ample",phonetic:"/ˈæmpl/",meaning:"绰绰有余；充裕",nuance:"不仅够用，还有富余。语气积极，暗示不必担心不够。让人感到安心和宽裕。",example:"There is ample time to prepare for the exam.",exampleCn:"有充裕的时间准备考试。",collocation:["ample time","ample space","ample evidence"],synonyms:["plentiful","abundant"],antonyms:["scarce","meager"],formality:"neutral",register:"通用/书面",quantity:.65,sentiment:.75,etymology:{root:"ampl",analysis:'来自拉丁语 amplus（宽敞的、广阔的），与 amplify（放大）同源。核心意象是"空间上的宽敞"，引申为"数量上的充裕"。ample 强调的是"有回旋余地"——不仅够，还多出一块。'}},{id:9,word:"plentiful",phonetic:"/ˈplentɪfəl/",meaning:"丰沛；大量存在",nuance:"描述某物供应充足、随处可见。语气积极正面，常用于自然资源、食物供应等场景。让人感到富足。",example:"Food was plentiful during the harvest season.",exampleCn:"丰收季节食物非常充足。",collocation:["plentiful supply","plentiful resources","plentiful rain"],synonyms:["abundant","ample"],antonyms:["scarce","rare"],formality:"neutral",register:"通用",quantity:.72,sentiment:.78,etymology:{root:"plent",suffix:"-iful",analysis:'plent（来自拉丁语 plenus "满的"）+ -iful（充满...的）= "充满的"。与 plenty（大量）同源。核心意象是"满到溢出来"。plentiful 比 plenty 更正式，常用于书面描述自然资源的丰富。'}},{id:10,word:"copious",phonetic:"/ˈkoʊpiəs/",meaning:"大量且详实",nuance:'不仅数量大，而且内容丰富详尽。语气积极偏学术，暗含赞赏。常用于描述笔记、文献等需要"量大且充实"的语境。',example:"She took copious notes during the lecture.",exampleCn:"她在讲座中做了大量详实的笔记。",collocation:["copious notes","copious amounts","copious rainfall"],synonyms:["abundant","profuse"],antonyms:["scarce","sparse"],formality:"formal",register:"学术/文学",quantity:.78,sentiment:.8,etymology:{root:"copi",suffix:"-ous",analysis:'来自拉丁语 copia（丰富、大量），由 co-（共同）+ ops（财富、资源）组成。与 copy（复制）同源——因为"丰富"所以"可以复制很多份"。核心意象是"资源丰富到可以任意取用"。'}},{id:11,word:"abundant",phonetic:"/əˈbʌndənt/",meaning:"极其丰富；充沛",nuance:'光谱中"多"的巅峰正面词。强调数量极大、远超需求。语气非常积极，常用于自然资源、才华等。带有赞美和庆幸。',example:"The region is abundant in natural resources.",exampleCn:"该地区自然资源极其丰富。",collocation:["abundant resources","abundant evidence","abundant life"],synonyms:["plentiful","copious"],antonyms:["scarce","lacking"],formality:"neutral",register:"通用/正式",quantity:.85,sentiment:.88,etymology:{prefix:"ab-",root:"und",suffix:"-ant",analysis:'ab-（离开、向外）+ und（波浪、涌动，来自拉丁语 unda）+ -ant（形容词后缀）= "像波浪一样向外涌出的"。核心意象是"如波浪般源源不断"。与 undulate（波动）同源。abundant 是所有"多"的词汇中最具画面感的一个。'}},{id:12,word:"excessive",phonetic:"/ɪkˈsesɪv/",meaning:"过多；过度",nuance:'从"丰富"跨入"过量"的领域。带有负面判断——超过了合理或可接受的范围。暗含批评和警告。',example:"Excessive drinking can lead to serious health problems.",exampleCn:"过度饮酒会导致严重的健康问题。",collocation:["excessive force","excessive drinking","excessive heat"],synonyms:["extreme","immoderate"],antonyms:["moderate","reasonable"],formality:"neutral",register:"通用/正式",quantity:.92,sentiment:.15,etymology:{prefix:"ex-",root:"cess",suffix:"-ive",analysis:'ex-（向外、超出）+ cess（走，来自拉丁语 cedere）+ -ive（形容词后缀）= "走出去了的"。与 exceed（超出）、excess（过量）同源。核心意象是"走过了头"。excessive 强调的是"越界"——不是多本身有问题，而是多到了不合理的程度。'}},{id:13,word:"lavish",phonetic:"/ˈlævɪʃ/",meaning:"奢靡；挥霍的奢华",nuance:'光谱的极端——不仅是"多"，更是"奢华到浪费"。常描述宴席、装饰、花费等。带有惊叹或批评，情感复杂：既羡慕又觉得过分。',example:"They held a lavish party for their anniversary.",exampleCn:"他们为纪念日举办了一场奢华的派对。",collocation:["lavish party","lavish lifestyle","lavish praise"],synonyms:["extravagant","sumptuous"],antonyms:["frugal","modest"],formality:"formal",register:"文学/社交",quantity:1,sentiment:.25,etymolo
